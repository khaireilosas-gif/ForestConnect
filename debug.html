<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ForestConnect X-Ray</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eceff1; }
        #debug-panel { background: white; border: 2px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .log { margin: 5px 0; font-weight: bold; font-family: monospace; }
        .success { color: #2e7d32; }
        .error { color: #c62828; }
        #map { height: 400px; border-radius: 8px; border: 2px solid #2196f3; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #1976d2; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #90caf9; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>Diagnostic X-Ray Tracker</h2>
    
    <div id="debug-panel">
        <div class="log" style="color: #555;">⏳ Starting system check...</div>
    </div>

    <div id="map"></div>
    
    <button id="test-btn" disabled>Test Submit Button</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const panel = document.getElementById('debug-panel');
        function logSuccess(msg) { panel.innerHTML += `<div class="log success">✅ ${msg}</div>`; }
        function logError(msg) { panel.innerHTML += `<div class="log error">❌ ERROR: ${msg}</div>`; }

        try {
            // 1. Test Map Initialization
            const map = L.map('map').setView([4.2105, 101.9758], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            logSuccess("Leaflet Map loaded successfully.");

            // 2. Test Map Clicks & Button Unlock
            map.on('click', (e) => {
                L.marker(e.latlng).addTo(map);
                document.getElementById('test-btn').disabled = false;
                logSuccess(`Map clicked! Pin dropped at Lat: ${e.latlng.lat.toFixed(4)}. Button UNLOCKED.`);
            });

            // 3. Test Database Connection
            logSuccess("Attempting to talk to Python Server...");
            fetch('http://127.0.0.1:8000/api/reports')
                .then(res => {
                    if (!res.ok) throw new Error("Python rejected the request (Status " + res.status + ")");
                    return res.json();
                })
                .then(data => {
                    if (Array.isArray(data)) {
                        logSuccess(`Python Connection SUCCESS! Found ${data.length} rows of data.`);
                        data.forEach(r => L.marker([r.lat, r.lng]).addTo(map));
                    } else {
                        logError("Python connected, but the data is broken. Check your database columns.");
                    }
                })
                .catch(err => {
                    logError("Cannot connect to Python. Is uvicorn running? Error: " + err.message);
                });

        } catch (e) {
            logError("CRITICAL JAVASCRIPT CRASH: " + e.message);
        }
    </script>
</body>
</html>
